<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">Candidate Data Transformer architecture</title>
  <desc id="desc">Layered flow from CLI through application service and pipeline stages to canonical models and reports.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2; rx: 10; }
      .accent { fill: #e0f2fe; stroke: #0369a1; }
      .text { font: 16px system-ui, sans-serif; fill: #0f172a; text-anchor: middle; }
      .small { font: 13px system-ui, sans-serif; fill: #334155; text-anchor: middle; }
      .line { stroke: #334155; stroke-width: 2; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="960" height="520" fill="#ffffff"/>
  <rect class="box accent" x="330" y="30" width="300" height="65"/>
  <text class="text" x="480" y="58">CLI (Typer)</text>
  <text class="small" x="480" y="80">arguments, JSON output, error handling</text>
  <line class="line" x1="480" y1="95" x2="480" y2="125"/>
  <rect class="box" x="330" y="130" width="300" height="65"/>
  <text class="text" x="480" y="158">ApplicationService</text>
  <text class="small" x="480" y="180">request and ordered stage construction</text>
  <line class="line" x1="480" y1="195" x2="480" y2="225"/>
  <rect class="box" x="330" y="230" width="300" height="65"/>
  <text class="text" x="480" y="258">Pipeline</text>
  <text class="small" x="480" y="280">stateless stage executor</text>
  <line class="line" x1="480" y1="295" x2="480" y2="325"/>
  <rect class="box accent" x="70" y="330" width="820" height="90"/>
  <text class="text" x="480" y="357">Pipeline stages</text>
  <text class="small" x="480" y="384">ATS Parser · Resume Parser · Normalization · Merge</text>
  <text class="small" x="480" y="405">Confidence · Validation · Projection</text>
  <line class="line" x1="480" y1="420" x2="480" y2="450"/>
  <rect class="box" x="210" y="455" width="240" height="50"/>
  <text class="text" x="330" y="486">Canonical models</text>
  <rect class="box" x="510" y="455" width="240" height="50"/>
  <text class="text" x="630" y="486">Reports and projection</text>
</svg>
