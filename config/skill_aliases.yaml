 
#
# Keys are matched case-insensitively against cleaned skill strings; values
# are the canonical display form written into the Candidate. Manually
# curated -- coverage is intentionally incomplete and should grow as new
# variants are observed (see IMPLEMENTATION_PLAN risk: "Skill alias table is
# manually curated -- incomplete coverage").
#
# Parenthetical variants (e.g. "Generative AI (LangChain, ...)") are
# handled in normalize_skill() by stripping the parenthetical and matching
# only the base name -- no need to enumerate every combination here.

