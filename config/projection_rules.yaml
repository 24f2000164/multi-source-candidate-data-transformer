# Assignment projection rules.
#
# NOTE: AssignmentProjection uses code-driven structural mapping (not this
# YAML) for the default "assignment" projection. This file is retained for:
#   - Backward compatibility with tests that pass a custom rules_path
#   - Documentation of the internal → output field mapping
#
# The code-driven mapper handles transformations this YAML cannot express:
# field combination (first_name + last_name → full_name), list wrapping,
# structured location parsing, skills enrichment, and provenance flattening.

version: "1.0"

fields:
  id:
    output: candidate_id
  first_name:
    output: first_name
  last_name:
    output: last_name
  external_id:
    output: externalId
  contact.email:
    output: email
  contact.phone:
    output: phoneNumber
  contact.location:
    output: location
  experiences:
    output: experience
  education:
    output: education
  skills:
    output: skills
  certifications:
    output: certifications
  languages:
    output: languages