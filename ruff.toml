# Ruff configuration
# Docs: https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 88
src = ["src", "tests"]

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "C4",   # flake8-comprehensions
    "RUF",  # Ruff-specific rules
    "ANN",  # flake8-annotations
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "PTH",  # flake8-use-pathlib
    "ERA",  # eradicate (commented-out code)
]

ignore = [
    "ANN101",  # missing-type-self (deprecated)
    "ANN102",  # missing-type-cls (deprecated)
    "ANN401",  # dynamically-typed-expression (Any) – allowed where needed
]

[lint.per-file-ignores]
"tests/**/*.py" = [
    "ANN",     # annotations not required in tests
    "S101",    # assert allowed in tests
]

[lint.isort]
known-first-party = ["transformer"]
force-sort-within-sections = true

[lint.pep8-naming]
classmethod-decorators = ["classmethod", "pydantic.validator", "pydantic.field_validator"]

[format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
